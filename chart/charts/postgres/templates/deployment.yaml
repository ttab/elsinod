apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  labels:
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: "postgres:{{ .Chart.AppVersion }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_PASSWORD
              value: {{ .Values.globals.dbPassword | quote }}
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data/

      volumes:
        - name: postgres-data
          emptyDir:
            sizeLimit: 2Gi
